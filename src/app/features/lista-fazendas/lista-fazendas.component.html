<div class="row">
  <div class="col-md-4" *ngFor="let f of fazendas">
    <div class="card mb-4 shadow-sm border-left-success">
      <div class="card-body">
        <h5 class="card-title text-success">{{ f.nome | uppercase }}</h5>
        <hr>
        <p class="card-text">
          <strong>Cultura:</strong> {{ f.cultura }} <br>
          <strong>Área:</strong> {{ f.tamanhoHectares | number:'1.2-2' }} ha
        </p>

        <div class="d-flex justify-content-between align-items-center">
          <span class="badge bg-info text-dark">{{ f.status }}</span>

          <button class="btn btn-outline-danger btn-sm" (click)="excluir(f.id)">
            🗑️ Excluir
          </button>
        </div>

        <div class="text-end mt-2">
          <small class="text-muted">ID: #{{ f.id }}</small>
        </div>
      </div>
    </div>
  </div>
</div>
