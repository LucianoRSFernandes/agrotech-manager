<div class="card shadow">
  <div class="card-header bg-success text-white">
    <h4 class="mb-0">Cadastrar Nova Propriedade</h4>
  </div>
  <div class="card-body">
    <form [formGroup]="fazendaForm" (ngSubmit)="salvar()">
      
      <div class="mb-3">
        <label class="form-label">Nome da Fazenda</label>
        <input type="text" formControlName="nome" class="form-control" 
               [class.is-invalid]="fazendaForm.get('nome')?.invalid && fazendaForm.get('nome')?.touched">
        <div class="invalid-feedback">O nome deve ter pelo menos 3 caracteres.</div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Tamanho (Hectares)</label>
          <input type="number" formControlName="tamanhoHectares" class="form-control">
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Cultura Principal</label>
          <select formControlName="cultura" class="form-select">
            <option value="">Selecione...</option>
            <option value="Soja">Soja</option>
            <option value="Milho">Milho</option>
            <option value="Cana">Cana</option>
            <option value="Café">Café</option>
          </select>
        </div>
      </div>

      <div class="d-flex justify-content-end gap-2">
        <button type="button" class="btn btn-light" routerLink="/listagem">Cancelar</button>
        <button type="submit" class="btn btn-success" [disabled]="fazendaForm.invalid">Salvar Fazenda</button>
      </div>
      
    </form>
  </div>
</div>
